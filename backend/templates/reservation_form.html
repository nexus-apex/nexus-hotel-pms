{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Reservation | NexusHotelPMS{% endblock %}
{% block page_title %}{% if editing %}Edit Reservation{% else %}New Reservation{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Guest Name</label>
        <input type="text" name="guest_name" value="{{ record.guest_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Guest Email</label>
        <input type="email" name="guest_email" value="{{ record.guest_email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Room Number</label>
        <input type="text" name="room_number" value="{{ record.room_number|default:'' }}">
      </div>
      <div class="form-group">
        <label>Check In</label>
        <input type="date" name="check_in" value="{{ record.check_in|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Check Out</label>
        <input type="date" name="check_out" value="{{ record.check_out|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Nights</label>
        <input type="number" name="nights" value="{{ record.nights|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Total</label>
        <input type="number" step="0.01" name="total" value="{{ record.total|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="confirmed" {% if record.status == 'confirmed' %}selected{% endif %}>Confirmed</option>
          <option value="checked_in" {% if record.status == 'checked_in' %}selected{% endif %}>Checked In</option>
          <option value="checked_out" {% if record.status == 'checked_out' %}selected{% endif %}>Checked Out</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Payment</label>
        <select name="payment">
          <option value="paid" {% if record.payment == 'paid' %}selected{% endif %}>Paid</option>
          <option value="pending" {% if record.payment == 'pending' %}selected{% endif %}>Pending</option>
        </select>
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Reservation</button>
      <a href="/reservations/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
