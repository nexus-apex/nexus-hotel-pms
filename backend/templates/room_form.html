{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Room | NexusHotelPMS{% endblock %}
{% block page_title %}{% if editing %}Edit Room{% else %}New Room{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Room Number</label>
        <input type="text" name="room_number" value="{{ record.room_number|default:'' }}">
      </div>
      <div class="form-group">
        <label>Room Type</label>
        <select name="room_type">
          <option value="single" {% if record.room_type == 'single' %}selected{% endif %}>Single</option>
          <option value="double" {% if record.room_type == 'double' %}selected{% endif %}>Double</option>
          <option value="suite" {% if record.room_type == 'suite' %}selected{% endif %}>Suite</option>
          <option value="deluxe" {% if record.room_type == 'deluxe' %}selected{% endif %}>Deluxe</option>
          <option value="presidential" {% if record.room_type == 'presidential' %}selected{% endif %}>Presidential</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Floor</label>
        <input type="number" name="floor" value="{{ record.floor|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Rate Per Night</label>
        <input type="number" step="0.01" name="rate_per_night" value="{{ record.rate_per_night|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="available" {% if record.status == 'available' %}selected{% endif %}>Available</option>
          <option value="occupied" {% if record.status == 'occupied' %}selected{% endif %}>Occupied</option>
          <option value="maintenance" {% if record.status == 'maintenance' %}selected{% endif %}>Maintenance</option>
          <option value="reserved" {% if record.status == 'reserved' %}selected{% endif %}>Reserved</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Amenities</label>
      <textarea name="amenities">{{ record.amenities|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Room</button>
      <a href="/rooms/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
